name: Validate

# Validate every entry on PRs and pushes (except the release branch, which has
# its own build workflow). Fails the check on any ERROR; warnings are allowed.
on:
  pull_request:
  push:
    branches-ignore:
      - release

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate registry
        run: python scripts/validate.py
